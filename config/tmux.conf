set -g default-terminal "tmux-256color"

# MOUSE ON — the model is the single-command tmux GRID (`farm 8` builds/rebuilds/repacks the
# whole 32-pane grid for you; Ghostty can't be scripted to auto-build splits, so the grid is
# the only "farm handles everything" option). tmux owns the mouse so the grid is fully usable:
#   - CLICK a pane -> focus it; click the status bar / use tabs -> switch windows.
#   - SELECT: plain LEFT-DRAG -> tmux copy-mode, confined to ONE pane (even over Claude Code),
#     copies to the Mac clipboard, keeps the highlight; right-click -> Copy/Paste menu at mouse.
#   - WHEEL scrolls; keyboard copy: prefix [ -> v select -> y/Enter.
# tmux 3.6b has a copy-mode crash on macOS; keep the stable mouse UX, but take a
# throttled snapshot before copy-mode so recovery is current if tmux aborts.
# Reach the farm over SSH (not mosh) so the mouse reaches tmux: the MacBook `farm` fn uses ssh.
# Shift+drag is left to Ghostty as a deliberate flat/cross-pane selection escape hatch.
set -g mouse on
set -g set-clipboard on
# Copies are ALSO piped to the MacBook's clipboard via bin/macpaste (ssh->pbcopy over
# Tailscale). This is what makes copy work over MOSH, which doesn't relay tmux's OSC52.
# set-clipboard/OSC52 above still covers the ssh path (`farms`). Both fire; harmless overlap.
set -g focus-events on
set -g @farm-risk-snapshot '~/Projects/farm/bin/farm-risk-snapshot farm 20'
# vi copy-mode so KEYBOARD copy works the common way: prefix [ -> move -> v (select) ->
# y (copy, keep) / Enter (copy + exit). All routed to the Mac clipboard via set-clipboard
# (OSC52). Explicitly advertise the ghostty clipboard cap too (xterm* already matches, belt+braces).
set -g mode-keys vi
set -as terminal-features 'xterm-ghostty:clipboard'
bind [ run-shell -b '~/Projects/farm/bin/farm-risk-snapshot farm 20' \; copy-mode
bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi y     send -X copy-pipe-no-clear "~/Projects/farm/bin/macpaste"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "~/Projects/farm/bin/macpaste"
# prefix+m toggles tmux mouse OFF if you ever want a one-off Ghostty-native flat selection.
bind m set -g mouse \; display "tmux mouse #{?mouse,ON,OFF}"
# Mouse binds for the grid (active because mouse is ON):
# HOLD-AND-DRAG selects, over ANY app (Claude, Codex, shell): tmux owns the drag and runs its
# own pane-confined copy-mode selection (-M), so you get uniform select+copy everywhere instead
# of each app's partial/missing native selection. A plain CLICK (press+release, no drag) never
# triggers this — it's handled by MouseDown/MouseUp below and just focuses the pane. Only a
# real drag (mouse moved while held) enters copy-mode.
bind -n MouseDrag1Pane   if -F "#{pane_in_mode}" "send -M" "run-shell -b '~/Projects/farm/bin/farm-risk-snapshot farm 20'" \; if -F "#{pane_in_mode}" "" "copy-mode -M"
bind -n S-MouseDrag1Pane if -F "#{pane_in_mode}" "send -M" "run-shell -b '~/Projects/farm/bin/farm-risk-snapshot farm 20'" \; if -F "#{pane_in_mode}" "" "copy-mode -M"
# Drag release -> copy to the Mac clipboard and KEEP the highlight (no-clear), so you can
# re-drag to select something else (re-copies, stays selected) or right-click the selection.
bind -T copy-mode    MouseDragEnd1Pane   send -X copy-pipe-no-clear "~/Projects/farm/bin/macpaste"
bind -T copy-mode-vi MouseDragEnd1Pane   send -X copy-pipe-no-clear "~/Projects/farm/bin/macpaste"
bind -T copy-mode    S-MouseDragEnd1Pane send -X copy-pipe-no-clear "~/Projects/farm/bin/macpaste"
bind -T copy-mode-vi S-MouseDragEnd1Pane send -X copy-pipe-no-clear "~/Projects/farm/bin/macpaste"
# In copy-mode (reached by scrolling up): a clean CLICK focuses the pane and drops back to the
# live prompt. We act on RELEASE (MouseUp), not press, so it never kills a drag-select: a press
# just clears any old highlight, a drag selects + copies, and a plain click (down+up, no drag)
# exits. A drag ends via MouseDragEnd instead, so selections are preserved. q/Esc/Enter exit too.
bind -T copy-mode    MouseDown1Pane send -X clear-selection
bind -T copy-mode-vi MouseDown1Pane send -X clear-selection
bind -T copy-mode    MouseUp1Pane   select-pane -t = \; send -X cancel
bind -T copy-mode-vi MouseUp1Pane   select-pane -t = \; send -X cancel
# Right-click on the kept selection -> Copy / Paste menu (Copy yanks to Mac clipboard + exits;
# Esc dismisses the menu). Kept minimal — no Search/separator (those broke display-menu parsing).
bind -T copy-mode    MouseDown3Pane display-menu -x M -y M -T "#[align=centre]Selection" \
  "Copy"  c "send -X copy-pipe-and-cancel '~/Projects/farm/bin/macpaste'" \
  "Paste" p "paste-buffer -p"
bind -T copy-mode-vi MouseDown3Pane display-menu -x M -y M -T "#[align=centre]Selection" \
  "Copy"  c "send -X copy-pipe-and-cancel '~/Projects/farm/bin/macpaste'" \
  "Paste" p "paste-buffer -p"

# === natural scrollback UX (type-to-exit + smooth wheel) ===
# tmux owns the scrollback (Ghostty only ever sees ONE screen of a pane), so
# copy-mode is unavoidable when you scroll up — these binds just make it feel
# natural instead of modal-and-sticky:
#   - WHEEL: smaller 3-line steps; one notch past the bottom drops you back to
#     the live prompt instead of sitting stuck at [0/N].
#   - TYPE-TO-EXIT: while scrolled up, any normal key snaps to the bottom AND
#     lands the keystroke at the live prompt (so typing `ls<enter>` just works,
#     Ghostty-like). Generated per printable char so the character passes
#     through. Copy keys are PRESERVED — v/V begin a selection, y/Enter copy,
#     q/Escape quit, arrows extend — so mouse drag AND `prefix [` keyboard copy
#     still work. Trade-off (chosen): vi search `/` `?` and goto `g`/`G` no
#     longer work in scrollback, and commands starting with v/y/q won't land
#     their first char (those keys stay copy-mode keys).
bind -T copy-mode-vi WheelUpPane   send -X -N3 scroll-up
bind -T copy-mode-vi WheelDownPane if -F "#{==:#{scroll_position},0}" "send -X cancel" "send -X -N3 scroll-down"
# Per-printable-char "cancel + send literal" binds (so the keystroke lands at the
# live prompt). GENERATED — see config/copy-passthrough.conf and gen-passthrough.
source-file -q ~/Projects/farm/config/copy-passthrough.conf
# === end natural scrollback UX ===

# Kill input lag + fix arrow keys in TUI option pickers (Claude Code / Codex).
# Two independent fixes:
#  1. escape-time: tmux defaults to 500ms waiting after ESC to tell a lone Esc from
#     an escape sequence. Arrows ARE escape sequences (ESC[A) -> laggy/dead arrows.
#  2. extended-keys: CC/Codex pickers request keys via the kitty keyboard protocol;
#     tmux can't forward them unless extended-keys is on AND the outer terminal is
#     declared extkeys-capable. Ghostty is ($TERM=xterm-ghostty), so opt it in.
#     Use 'on' (not 'always' — 'always' prints raw ^[[27;… garbage in some TUIs).
set -sg escape-time 10
set -s extended-keys on
set -as terminal-features 'xterm-ghostty:extkeys'
set -g focus-events on

# === resize ONLY at attach, then freeze (kills the copy-mode resize_window spin) ===
# The farm is a FIXED grid, created oversized (`tmux new-session -x 480 -y 120`); the
# only resize we actually need is the one-time shrink-to-fit when a client attaches so
# the whole grid lands on screen. tmux's default (`window-size latest`) instead re-runs
# resize_window on EVERY client size change forever — including the transient wobble
# macOS emits on screen-lock. If a pane is in copy-mode (scrolled up) at that instant,
# layout_fix_panes -> window_copy_resize can spin at 100% CPU indefinitely and wedge the
# whole server (unresponsive to every tmux command; confirmed by `sample` of the hung
# pid). So: freeze auto-sizing, and do the fit ourselves exactly once, on attach.
#   - window-size manual : tmux never auto-resizes -> lock/display wobbles are ignored.
#   - client-attached    : run farm-fit to shrink every window to the attaching client
#                          (cancelling copy-mode first, so even this one resize can't spin).
# On-demand refit if you ever drag the window bigger: prefix + F.
set -g window-size manual
set-hook -g client-attached 'run-shell "~/Projects/farm/bin/farm-fit #{client_width} #{client_height} #{session_name}"'
bind F run-shell "~/Projects/farm/bin/farm-fit '' '' #{session_name}" \; display "farm refit"
# === end resize-at-attach ===

# Shift+Enter -> newline in agent composers (Codex, Claude Code) THROUGH tmux.
# Why a binding and not just extended-keys: tmux's extended-keys is the
# modifyOtherKeys/CSI-u mechanism, NOT kitty-protocol passthrough. With
# `extended-keys on` an app gets a distinct Shift+Enter only if it negotiates
# modifyOtherKeys *mode 2* (mode 1 leaves Enter — a "well-known" key — collapsed
# to plain CR), and `always` forces mode 1, not 2. Codex/Claude speak the kitty
# protocol, which tmux doesn't forward — so Shift+Enter silently became Enter.
# tmux DOES still decode Shift+Enter from Ghostty itself (extkeys feature above),
# so we catch it here and inject the literal kitty Shift+Enter bytes (ESC [13;2u)
# straight into the pane — exactly what both TUIs parse as "insert newline".
# Plain Enter is untouched (still submits). Verified: emits ^[[13;2u.
bind -n S-Enter send-keys Escape "[13;2u"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin "tmux-plugins/tmux-continuum"
# 1 = save every minute (continuum's floor; it's minute-granular). status-interval
# below is kept lower than this so the save gate actually fires on time instead of
# drifting toward 2 min.
set -g @continuum-save-interval "1"
# Auto-restore the last saved environment on tmux server start (survives reboots)
set -g @continuum-restore 'on'

# Resurrect: save/restore pane contents
# prefix + Ctrl-s = save, prefix + Ctrl-r = restore
set -g @resurrect-capture-pane-contents 'on'

# Run TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'

# === agent farm: grid navigation QoL ===
# Alt+arrow: jump between panes WITHOUT the prefix (essential for 24-pane grids)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
# Ctrl+Shift+arrow: jump between windows without prefix. Shift+Left/Right are
# left unbound so agent composers can use them (for example edit last queued
# message) instead of tmux stealing them for tab changes.
bind -n C-S-Left  previous-window
bind -n C-S-Right next-window
# Keep pane scrollback bounded for smoother copy-mode/grid redraws. Agent-native
# transcripts remain outside tmux; use farm-transcripts for older run history.
set -g history-limit 10000
bind C clear-history \; display "pane history cleared"
set -g pane-border-status top
set -g pane-border-format " #P #{pane_current_command} "
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"
# === end agent farm ===

# === agent farm: 1-based labels L1 L2 L3 ... ===
set -g base-index 1
setw -g pane-base-index 1
set -g pane-border-format " L#{pane_index} #{?pane_title,#{pane_title},#{pane_current_command}} "
# === end labels ===

# === tabs on top ===
set -g status-position top
# === end ===

# === cloud marker: faint cloud glyph in pane label when @loc=cloud (local = unchanged) ===
set -g pane-border-format " L#{pane_index} #{?#{==:#{@loc},cloud},#[fg=colour66]☁ #[default],}#{pane_current_command} "


# === project-aware tab names (git root, else last-2) — driven by farm-tabname ===
set -g automatic-rename off
set-hook -g pane-focus-in "run-shell \"~/.local/bin/farm-tabname #{pane_current_path} #{pane_id}\""
# === end ===

# === pane border shows project (@proj from farm-tabname) ===
set -g pane-border-format " L#{pane_index} #{?#{@proj},#{@proj},#{b:pane_current_path}} "
# === end ===

# === clean top-right: last resurrect save, date, host ===
# 30s: lower than @continuum-save-interval (60s) so the once-a-minute save gate
# fires on time instead of drifting to ~2 min. This only controls how often the
# status bar refreshes — continuum still self-throttles to one save/min and holds
# an overlap lock, so a faster refresh never means more (or concurrent) saves.
set -g status-interval 30
set -g status-right-length 70
# SAVED time, flicker-proof: continuum's in-memory timestamp is occasionally empty
# at the instant tmux re-runs this #() job (every status-interval), which printed a
# one-frame --:--. Cache the last good value to a file and always display the cache,
# so a transient empty read re-shows the previous time instead of blanking.
# (no parens/braces in the shell snippet — tmux's #() parser would treat them as the
#  closing delimiter; backticks + $USER avoid that.)
# EVERY % inside the #() must be doubled: tmux runs strftime over the whole
# status-right BEFORE the shell, so a lone %H/%M/%s would be replaced by tmux (that's
# why the cache once stored a raw epoch — `printf %s` became `printf <epoch>`). The
# trailing %d %b %H:%M stays single — that one IS meant for tmux's clock.
# CONTINUUM SAVE HOOK (trailing #()): tmux-continuum drives its periodic save by
# appending #(continuum_save.sh) to status-right when it loads (during `run tpm`
# above). Setting status-right here AFTER that would wipe the hook, so continuum
# would never save and @continuum-restore would have nothing to restore on
# reboot/crash. We re-add the hook at the end. The script prints nothing (no
# visual change); it saves every @continuum-save-interval minutes on status refresh.
set -g status-right ' #[fg=colour66]SAVED #(t=#{@continuum-save-last-timestamp}; f=/tmp/tmux-saved-$USER; v=`date -r "$t" +%%H:%%M 2>/dev/null`; [ -n "$v" ] && printf %%s "$v" >"$f"; cat "$f" 2>/dev/null || echo --:--)  #[fg=colour244]%d %b %H:%M  #[fg=colour109]#(whoami)@#h #(~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh)'
# === end ===

# === transparent status bar + subtle accents (kill the solid green/yellow) ===
set -g status-style "bg=default,fg=colour245"
set -g window-status-style "fg=colour244"
set -g window-status-current-style "fg=colour39,bold"
set -g window-status-activity-style "fg=colour39"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
set -g message-style "bg=default,fg=colour39"
set -g message-command-style "bg=default,fg=colour39"
set -g mode-style "bg=colour238,fg=colour252"
# === end ===

# one-key zoom toggle (no prefix): Alt+z fullscreen this pane / back
bind -n M-z resize-pane -Z

# INSPECT — blow up the focused pane's content into a near-fullscreen, scrollable,
# READ-ONLY overlay (great for reading a long prompt/output cramped in a tiny grid
# pane). It's a display-popup (pure overlay: never touches layout/focus) hosting a
# throwaway nested tmux in copy-mode, so it scrolls/copies like the farm and closes
# on Esc/q — leaving the grid exactly as it was. See bin/farm-inspect.  prefix + i
# INSPECT — fullscreen the focused pane LIVE (interactive, full input/scrollback);
# same key toggles back to the grid. Native zoom; window is fit-to-client at attach (see
# the resize-at-attach block above; window-size is manual, farm-fit does the one-time fit).
bind i resize-pane -Z

# === final pane-border-format: label follows focus (blue active / grey idle) so the whole border matches ===
set -g pane-border-format " #{?pane_active,#[fg=colour39],#[fg=colour244]}L#{pane_index} #{?#{==:#{@loc},cloud},☁ ,}#{?#{@proj},#{@proj},#{b:pane_current_path}} "
# === end ===

# disable prefix zoom (Ctrl-b z) — it confused more than helped
unbind z

set -as terminal-features '*:RGB'

# Border "breathing" while typing (tmux #715): a redraw of one pane shifts the row's
# dividers because ambiguous-width / Nerd-Font glyphs in the prompt are mis-measured.
# Mitigations: tell tmux the terminal is full UTF-8 + Unicode-style capable so widths
# are computed correctly, and use plain ASCII single-line borders (no fancy glyphs in
# the divider itself, which is the part that visibly jumps).
set -as terminal-features '*:UTF-8'
set -as terminal-features '*:usstyle'
set -g pane-border-lines single

# borders: no dynamic top label (was causing redraw jitter + half-color)
set -g pane-border-status off
